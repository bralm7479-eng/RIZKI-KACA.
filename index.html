<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>RIZKI KACA</title><link rel="stylesheet" href="style.css"></head><body><header><h1>RIZKI KACA</h1><p>Solusi Kaca Berkualitas</p></header><input id="q" placeholder="Cari produk..." oninput="render()"><div id="products"></div><script src="products.js"></script><script src="script.js"></script></body></html>
<script>
const card = document.querySelector(".showcase");

card.addEventListener("mousemove", (e) => {
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const rotateY = ((x / rect.width) - 0.5) * 20;
    const rotateX = ((y / rect.height) - 0.5) * -20;

    card.style.transform =
        `perspective(1000px)
         rotateX(${rotateX}deg)
         rotateY(${rotateY}deg)
         translateY(-10px)
         scale(1.03)`;
});

card.addEventListener("mouseleave", () => {
    card.style.transform =
        "perspective(1000px) rotateX(0) rotateY(0) translateY(0) scale(1)";
});
</script>
